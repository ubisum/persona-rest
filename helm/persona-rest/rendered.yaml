---
# Source: persona-rest/templates/deployment.yaml
apiVersion: apps/v1

kind: Deployment

metadata:

  name: persona

  labels:
    app.kubernetes.io/name: persona-rest
    app.kubernetes.io/instance: persona
    app.kubernetes.io/version: 0.0.1
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: persona-rest-0.1.0


spec:

  replicas: 1


  selector:

    matchLabels:
      app.kubernetes.io/name: persona-rest
      app.kubernetes.io/instance: persona


  template:

    metadata:

      labels:
        app.kubernetes.io/name: persona-rest
        app.kubernetes.io/instance: persona


    spec:

      containers:

        - name: persona-rest


          image: "ghcr.io/ubisum/persona-rest:0.0.1"


          imagePullPolicy: IfNotPresent


          ports:

            - name: http
              containerPort: 8080
              protocol: TCP


          env:


            - name: SPRING_PROFILES_ACTIVE

              valueFrom:
                configMapKeyRef:
                   name: persona-config
                   key: SPRING_PROFILES_ACTIVE



            - name: SPRING_DATASOURCE_URL

              value: "jdbc:mysql://mysql:3306/persona"



            - name: SPRING_DATASOURCE_USERNAME

              valueFrom:

                secretKeyRef:

                  name: persona

                  key: username



            - name: SPRING_DATASOURCE_PASSWORD

              valueFrom:

                secretKeyRef:

                  name: persona

                  key: password



          resources:
            {}
