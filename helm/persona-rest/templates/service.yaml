apiVersion: v1

kind: Service


metadata:

  name: {{ include "persona-rest.fullname" . }}

  labels:

    {{- include "persona-rest.labels" . | nindent 4 }}



spec:


  type: {{ .Values.service.type }}


  ports:


    - port: {{ .Values.service.port }}

      targetPort: http

      protocol: TCP

      name: http



  selector:

    {{- include "persona-rest.selectorLabels" . | nindent 4 }}
