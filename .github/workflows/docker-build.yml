name: Build and Push Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write


jobs:

  build:

    name: Build Docker image

    runs-on: ubuntu-latest


    steps:

      #
      # Scarica il codice dal repository
      #
      - name: Checkout repository
        uses: actions/checkout@v4


      #
      # Configura Java e Maven Wrapper
      #
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven


      #
      # Recupera la versione dal pom.xml
      #
      - name: Extract Maven version
        id: version
        run: |
          VERSION=$(./mvnw help:evaluate \
            -Dexpression=project.version \
            -q \
            -DforceStdout)

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT


      #
      # Login al registry GitHub Container Registry
      #
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      #
      # Configura Docker Buildx
      #
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      #
      # Build e push dell'immagine
      #
      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:

          context: .

          push: true

          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}

          tags: |
            ghcr.io/ubisum/persona-rest:${{ steps.version.outputs.VERSION }}
